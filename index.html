<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Boxes Game</title>

</head>
<link rel="stylesheet" href="style.css">
<Script src="sceipt.js" defer></Script>

<body>
    <div class="container">
        <h1 id="greeting">Hello</h1>

        <div class="input-section">
            <input type="text" id="nameInput" placeholder="Enter your name">
            <button id="greetBtn">Greet me</button>
        </div>

        <div class="boxes">
            <div class="box" data-color="red">Red</div>
            <div class="box" data-color="blue">Blue</div>
            <div class="box" data-color="green">Green</div>
            <div class="box" data-color="yellow">Yellow</div>
        </div>
    </div>
</body>

</html>
